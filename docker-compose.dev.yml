services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - packages/backend/.env
    volumes:
      - ./packages/backend/src:/app/src
      # Bind mount so opencode (running on the host) sees the same cadquery.py
      # files the backend writes inside the container.
      - ./packages/backend/generated:/app/generated
    # Let the container reach opencode serve running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
