[project]
name = "cad-ai-backend"
version = "0.1.0"
description = "AI-powered CAD Studio backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "websockets>=14.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "cadquery>=2.4.0",
    "numpy>=1.26.0",
    "trimesh>=4.5.0",
    "pygltflib>=1.16.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "aiosqlite>=0.20.0",
    "alembic>=1.14.0",
    "httpx>=0.28.0",
    "anthropic>=0.40.0",
    "openai>=1.58.0",
    "python-multipart>=0.0.18",
    "Pillow>=11.0.0",
    "pymupdf>=1.24.0",
    "faiss-cpu>=1.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.28.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
